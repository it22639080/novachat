services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: novachat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novachat}
      POSTGRES_USER: ${POSTGRES_USER:-novachat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_for_local_dev}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novachat} -d ${POSTGRES_DB:-novachat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: novachat-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: novachat-api
    restart: unless-stopped
    env_file:
      - apps/api/.env.example
    environment:
      DATABASE_URL: postgresql://novachat:change_me_for_local_dev@postgres:5432/novachat?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: novachat-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
